<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP Instalaciones - Mi Día a Día PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#213d6b">
<link rel="apple-touch-icon" href="img/icon-192.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
}

header{
background:#213d6b;
color:white;
padding:20px;
text-align:center;
}

.logo{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.logo img{
width:90px;
height:90px;
object-fit:contain;
background:white;
border-radius:15px;
padding:10px;
}

.usuario{
margin-top:20px;
font-size:22px;
}

.salir{
margin-top:15px;
padding:10px 20px;
background:#e74c3c;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.grid{
padding:30px;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:25px;
max-width:1400px;
margin:auto;
}

.card{
background:white;
padding:40px 20px;
border-radius:25px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icono{
font-size:55px;
margin-bottom:20px;
}

.card h2{
font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="logo">

<img src="img/logo.jpg">

<div>

<h1>VIP INSTALACIONES</h1>
<h2>Mi Día a Día PRO</h2>

<div id="usuario" class="usuario"></div>

<button class="salir" onclick="cerrarSesion()">
Salir
</button>

</div>

</div>

</header>

<div class="grid">

<div class="card" onclick="location.href='agenda.html'">
<div class="icono">🗓️</div>
<h2>Agenda</h2>
</div>

<div class="card" onclick="location.href='clientes.html'">
<div class="icono">👥</div>
<h2>Clientes</h2>
</div>

<div class="card" onclick="location.href='usuarios.html'">
<div class="icono">🧑‍💼</div>
<h2>Usuarios</h2>
</div>

<div class="card" onclick="location.href='partes.html'">
<div class="icono">📄</div>
<h2>Partes</h2>
</div>

<div class="card" onclick="location.href='partes-listado.html'">
<div class="icono">📁</div>
<h2>Partes Guardados</h2>
</div>

<div class="card" onclick="location.href='vehiculos.html'">
<div class="icono">🚗</div>
<h2>Vehículos</h2>
</div>

<div class="card" onclick="location.href='presupuestos.html'">
<div class="icono">💰</div>
<h2>Presupuestos</h2>
</div>

<div class="card" onclick="location.href='facturas.html'">
<div class="icono">🧾</div>
<h2>Facturas</h2>
</div>

<div class="card" onclick="location.href='materiales.html'">
<div class="icono">📦</div>
<h2>Materiales</h2>
</div>

<div class="card" onclick="location.href='foto-pdf.html'">
<div class="icono">📷</div>
<h2>Foto → PDF</h2>
</div>

<div class="card" onclick="location.href='opciones.html'">
<div class="icono">⚙️</div>
<h2>Opciones</h2>
</div>

<div class="card" onclick="location.href='asistente.html'">
<div class="icono">🤖</div>
<h2>Asistente IA</h2>
</div>

</div>

<script>

const nombre =
localStorage.getItem("nombreTecnico")
||
localStorage.getItem("usuarioActivo")
||
"Invitado";

const rol =
localStorage.getItem("rolTecnico")
|| "";

document.getElementById("usuario").innerHTML =
`👤 ${nombre} (${rol})`;

function cerrarSesion(){

localStorage.removeItem("usuarioActivo");
localStorage.removeItem("nombreTecnico");
localStorage.removeItem("rolTecnico");
localStorage.removeItem("firmaTecnico");
localStorage.removeItem("emailTecnico");
localStorage.removeItem("telefonoTecnico");

location.href = "login.html";

}

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("service-worker.js")
.then(() => {
console.log("PWA instalada");
});

}

</script>

</body>
</html>
