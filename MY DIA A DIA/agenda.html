<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Agenda</title>

<style>

body{
    font-family:Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#0F4C81;
    color:white;
    text-align:center;
    padding:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-inicio{
    background:white;
    color:#0F4C81;
    margin-top:10px;
}

.agenda{
    display:grid;
    grid-template-columns:80px repeat(5,1fr);
    gap:1px;
    background:#ccc;
    margin:10px;
}

.celda{
    background:white;
    min-height:80px;
    padding:5px;
    font-size:12px;
}

.hora{
    background:#e6e6e6;
    text-align:center;
    font-weight:bold;
}

.dia{
    background:#0F4C81;
    color:white;
    text-align:center;
    font-weight:bold;
}

.trabajo{
    color:white;
    padding:5px;
    border-radius:5px;
    margin-top:5px;
    font-size:11px;
}

</style>
</head>

<body>

<header>

<h1>📅 Mi Agenda</h1>

<button
class="btn-inicio"
onclick="location.href='index.html'">
🏠 Inicio
</button>

</header>

<div id="agenda" class="agenda"></div>

<script>

const dias = [
"Lunes",
"Martes",
"Miércoles",
"Jueves",
"Viernes"
];

const horas = [
"08:00",
"09:00",
"10:00",
"11:00",
"12:00",
"13:00",
"14:00",
"15:00",
"16:00",
"17:00",
"18:00"
];

let trabajos =
JSON.parse(localStorage.getItem("agenda"))
|| {};

const agenda =
document.getElementById("agenda");

agenda.innerHTML +=
'<div class="celda"></div>';

dias.forEach(dia=>{

agenda.innerHTML +=
`<div class="celda dia">${dia}</div>`;

});

horas.forEach(hora=>{

agenda.innerHTML +=
`<div class="celda hora">${hora}</div>`;

dias.forEach(dia=>{

agenda.innerHTML +=
`
<div
class="celda"
onclick="crearTrabajo('${dia}','${hora}')"
id="${dia}_${hora}">
</div>
`;

});

});

function crearTrabajo(dia,hora){

let clientes =
JSON.parse(localStorage.getItem("clientes"))
|| [];

if(clientes.length===0){

alert(
"Primero debes crear un cliente."
);

return;

}

let listaClientes =
clientes
.map((c,i)=>
`${i+1} - ${c.nombre}`
)
.join("\n");

let seleccion =
prompt(
"Selecciona un cliente:\n\n" +
listaClientes
);

if(!seleccion) return;

let cliente =
clientes[seleccion-1];

if(!cliente){

alert("Cliente no válido");
return;

}

let descripcion =
prompt(
"Descripción del trabajo"
);

if(!descripcion) return;

let estado =
prompt(
"Estado:\npendiente\ncurso\nurgente\nfinalizado"
);

if(!estado)
estado = "pendiente";

let clave =
dia + "_" + hora;

trabajos[clave] = {

cliente:
cliente.nombre,

telefono:
cliente.telefono,

direccion:
cliente.direccion,

descripcion:
descripcion,

estado:
estado

};

localStorage.setItem(
"agenda",
JSON.stringify(trabajos)
);

mostrarAgenda();

}

function mostrarAgenda(){

for(let clave in trabajos){

let trabajo =
trabajos[clave];

let color =
"#00AEEF";

if(
trabajo.estado === "urgente"
)
color = "red";

if(
trabajo.estado === "curso"
)
color = "orange";

if(
trabajo.estado === "finalizado"
)
color = "green";

let celda =
document.getElementById(clave);

if(celda){

celda.innerHTML =
`
<div
class="trabajo"
style="background:${color}">

<strong>
${trabajo.cliente}
</strong>

<br>

${trabajo.descripcion}

</div>
`;

}

}

}

mostrarAgenda();

</script>

</body>
</html>
