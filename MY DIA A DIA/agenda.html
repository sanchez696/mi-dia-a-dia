<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#0F4C81;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,
textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

textarea{
height:100px;
}

button{
padding:12px 20px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}

.guardar{
background:green;
color:white;
}

.inicio{
background:#0F4C81;
color:white;
}

</style>

</head>

<body>

<header>

<h1>📅 Agenda</h1>

<button
class="inicio"
onclick="location.href='index.html'">

🏠 Inicio

</button>

</header>

<div class="container">

<div class="card">

<label>Fecha</label> <input type="date" id="fecha">

<label>Hora</label> <input type="time" id="hora">

<label>Cliente</label> <input type="text" id="cliente">

<label>Teléfono</label> <input type="text" id="telefono">

<label>Dirección</label> <input type="text" id="direccion">

<label>Trabajo a realizar</label>

<textarea id="trabajo"></textarea>

<label>Observaciones</label>

<textarea id="observaciones"></textarea>

<button
class="guardar"
onclick="guardarCita()">

💾 Guardar Cita

</button>

</div>

<div class="card">

<h2>📋 Próximas Citas</h2>

<div id="listado"></div>

</div>

</div>

<script>

document.getElementById("fecha").valueAsDate = new Date();

let citas =
JSON.parse(
localStorage.getItem("agenda")
) || [];

function guardarCita(){

let cita = {

fecha:
document.getElementById("fecha").value,

hora:
document.getElementById("hora").value,

cliente:
document.getElementById("cliente").value,

telefono:
document.getElementById("telefono").value,

direccion:
document.getElementById("direccion").value,

trabajo:
document.getElementById("trabajo").value,

observaciones:
document.getElementById("observaciones").value

};

citas.push(cita);

localStorage.setItem(
"agenda",
JSON.stringify(citas)
);

alert("Cita guardada correctamente");

mostrarCitas();

document.getElementById("cliente").value="";
document.getElementById("telefono").value="";
document.getElementById("direccion").value="";
document.getElementById("trabajo").value="";
document.getElementById("observaciones").value="";

}

function mostrarCitas(){

const listado =
document.getElementById("listado");

if(citas.length===0){

listado.innerHTML =
"<p>No hay citas guardadas.</p>";

return;

}

listado.innerHTML="";

citas.forEach((cita,index)=>{

listado.innerHTML += `

<div style="
border:1px solid #ddd;
padding:15px;
margin-bottom:10px;
border-radius:8px;
">

<p><strong>Fecha:</strong> ${cita.fecha}</p>

<p><strong>Hora:</strong> ${cita.hora}</p>

<p><strong>Cliente:</strong> ${cita.cliente}</p>

<p><strong>Teléfono:</strong> ${cita.telefono}</p>

<p><strong>Dirección:</strong> ${cita.direccion}</p>

<p><strong>Trabajo:</strong> ${cita.trabajo}</p>

<p><strong>Observaciones:</strong> ${cita.observaciones}</p>

<button
onclick="eliminarCita(${index})"
style="
background:red;
color:white;
">

🗑 Eliminar

</button>

</div>

`;

});

}

function eliminarCita(index){

if(confirm("¿Eliminar esta cita?")){

citas.splice(index,1);

localStorage.setItem(
"agenda",
JSON.stringify(citas)
);

mostrarCitas();

}

}

mostrarCitas();

</script>

</body>
</html>
