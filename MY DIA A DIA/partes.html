<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parte de Trabajo</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#0F4C81;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,
textarea,
select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:100px;
}

button{
padding:12px 20px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}

.guardar{
background:green;
color:white;
}

.inicio{
background:#0F4C81;
color:white;
}

canvas{
border:1px solid #ccc;
background:white;
width:100%;
height:200px;
touch-action:none;
}

</style>

</head>

<body>

<header>

<h1>📄 Parte de Trabajo</h1>

<button
class="inicio"
onclick="location.href='index.html'">

🏠 Inicio

</button>

</header>

<div class="container">

<div class="card">

<label>Fecha</label>
<input
type="date"
id="fecha">

<label>Cliente</label>
<input
type="text"
id="cliente">

<label>Técnico</label>
<input
type="text"
id="tecnico">

<label>Vehículo</label>
<input
type="text"
id="vehiculo">

<label>Trabajo realizado</label>
<textarea
id="trabajo">
</textarea>

<label>Material utilizado</label>
<textarea
id="material">
</textarea>

<label>Horas empleadas</label>
<input
type="number"
id="horas">

<label>Observaciones</label>
<textarea
id="observaciones">
</textarea>

</div>

<div class="card">

<h3>✍ Firma Cliente</h3>

<canvas
id="firma"
width="800"
height="200">
</canvas>

<br>

<button onclick="limpiarFirma()">
Borrar Firma
</button>

</div>

<div class="card">

<button
class="guardar"
onclick="guardarParte()">

💾 Guardar Parte

</button>

</div>

</div>

<script>

document
.getElementById("fecha")
.valueAsDate =
new Date();

const canvas =
document.getElementById("firma");

const ctx =
canvas.getContext("2d");

let dibujando=false;

canvas.addEventListener(
"mousedown",
iniciar
);

canvas.addEventListener(
"mousemove",
dibujar
);

canvas.addEventListener(
"mouseup",
parar
);

function iniciar(e){

dibujando=true;

ctx.beginPath();

ctx.moveTo(
e.offsetX,
e.offsetY
);

}

function dibujar(e){

if(!dibujando) return;

ctx.lineTo(
e.offsetX,
e.offsetY
);

ctx.stroke();

}

function parar(){

dibujando=false;

}

function limpiarFirma(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

function guardarParte(){

let partes =
JSON.parse(
localStorage.getItem("partes")
) || [];

let nuevoParte = {

fecha:
document.getElementById(
"fecha"
).value,

cliente:
document.getElementById(
"cliente"
).value,

tecnico:
document.getElementById(
"tecnico"
).value,

vehiculo:
document.getElementById(
"vehiculo"
).value,

trabajo:
document.getElementById(
"trabajo"
).value,

material:
document.getElementById(
"material"
).value,

horas:
document.getElementById(
"horas"
).value,

observaciones:
document.getElementById(
"observaciones"
).value

};

partes.push(
nuevoParte
);

localStorage.setItem(
"partes",
JSON.stringify(partes)
);

alert(
"Parte guardado correctamente"
);

location.href =
"partes-listado.html";

}

</script>

</body>
</html>
