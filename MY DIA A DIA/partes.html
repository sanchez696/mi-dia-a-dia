<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo Parte</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#213d6b;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 12px rgba(0,0,0,.1);
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,
textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:15px;
margin-right:8px;
font-weight:bold;
}

.inicio{
background:#213d6b;
color:white;
}

.guardar{
background:green;
color:white;
}

.borrar{
background:red;
color:white;
}

.firma{
border:2px solid #ccc;
background:white;
width:100%;
height:220px;
border-radius:12px;
touch-action:none;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<header>
<h1>📄 Nuevo Parte</h1>

<button class="inicio" onclick="location.href='index.html'">
🏠 Inicio
</button>
</header>

<div class="container">

<div class="card">

<label>Fecha</label>
<input type="date" id="fecha">

<label>Cliente</label>
<input type="text" id="cliente">

<label>Técnico</label>
<input type="text" id="tecnico">

<label>Vehículo</label>
<input type="text" id="vehiculo">

<label>Trabajo realizado</label>
<textarea id="trabajo"></textarea>

<label>Material utilizado</label>
<textarea id="material"></textarea>

<label>Horas empleadas</label>
<input type="number" id="horas">

<label>Observaciones</label>
<textarea id="observaciones"></textarea>

<label>📷 Fotos del trabajo</label>
<input type="file" id="fotos" accept="image/*" multiple>

<div id="previewFotos" class="preview"></div>

</div>

<div class="card">

<h3>✍ Firma Cliente</h3>

<canvas id="firmaCliente" class="firma" width="800" height="220"></canvas>

<button class="borrar" onclick="limpiarFirma('firmaCliente')">
Borrar firma cliente
</button>

</div>

<div class="card">

<h3>✍ Firma Técnico</h3>

<div id="firmaTecnicoContainer">

<canvas id="firmaTecnico" class="firma" width="800" height="220"></canvas>

</div>

<button class="borrar" onclick="limpiarFirma('firmaTecnico')">
Borrar firma técnico
</button>

</div>

<div class="card">

<button class="guardar" onclick="guardarParte()">
💾 Guardar Parte
</button>

</div>

</div>

<script>

const SUPABASE_URL =
"https://evhcygynfseonzlkqdsp.supabase.co";

const SUPABASE_KEY =
"sb_publishable_aB-_vkxGV9e7BujEy0NEfQ_lMfOlEMS";

const sb =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document.getElementById("fecha").valueAsDate = new Date();

document.getElementById("tecnico").value =
localStorage.getItem("nombreTecnico") || "";

let fotosBase64 = [];

document.getElementById("fotos").addEventListener("change", async function(e){

fotosBase64 = [];

const archivos =
Array.from(e.target.files);

for(const archivo of archivos){

const foto =
await convertirFoto(archivo);

fotosBase64.push(foto);

}

mostrarFotos();

});

function mostrarFotos(){

const preview =
document.getElementById("previewFotos");

preview.innerHTML = "";

fotosBase64.forEach(foto=>{

preview.innerHTML +=
`<img src="${foto}">`;

});

}

function convertirFoto(file){

return new Promise(resolve=>{

const reader =
new FileReader();

reader.onload = function(e){

const img =
new Image();

img.onload = function(){

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

const maxWidth = 900;

const scale =
Math.min(1,maxWidth / img.width);

canvas.width =
img.width * scale;

canvas.height =
img.height * scale;

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

resolve(
canvas.toDataURL("image/jpeg",0.45)
);

};

img.src =
e.target.result;

};

reader.readAsDataURL(file);

});

}

function activarFirma(id){

const canvas =
document.getElementById(id);

if(!canvas) return;

const ctx =
canvas.getContext("2d");

ctx.lineWidth = 4;
ctx.lineCap = "round";
ctx.strokeStyle = "#000";

let pintando = false;

function posicion(e){

const rect =
canvas.getBoundingClientRect();

const p =
e.touches ? e.touches[0] : e;

return {
x:(p.clientX - rect.left) * (canvas.width / rect.width),
y:(p.clientY - rect.top) * (canvas.height / rect.height)
};

}

function empezar(e){

e.preventDefault();

pintando = true;

const pos =
posicion(e);

ctx.beginPath();

ctx.moveTo(
pos.x,
pos.y
);

}

function mover(e){

if(!pintando) return;

e.preventDefault();

const pos =
posicion(e);

ctx.lineTo(
pos.x,
pos.y
);

ctx.stroke();

}

function terminar(){

pintando = false;

}

canvas.addEventListener("mousedown",empezar);
canvas.addEventListener("mousemove",mover);
canvas.addEventListener("mouseup",terminar);
canvas.addEventListener("mouseleave",terminar);

canvas.addEventListener("touchstart",empezar,{passive:false});
canvas.addEventListener("touchmove",mover,{passive:false});
canvas.addEventListener("touchend",terminar);

}

activarFirma("firmaCliente");
activarFirma("firmaTecnico");

const firmaGuardada =
localStorage.getItem("firmaTecnico");

if(
firmaGuardada &&
firmaGuardada !== ""
){

document.getElementById("firmaTecnicoContainer").innerHTML = `
<img
id="firmaTecnicoImg"
src="${firmaGuardada}"
style="
width:100%;
max-height:220px;
background:white;
border:2px solid #ccc;
border-radius:12px;
object-fit:contain;
">
`;

}

function limpiarFirma(id){

const canvas =
document.getElementById(id);

if(canvas){

const ctx =
canvas.getContext("2d");

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

if(id === "firmaTecnico"){

localStorage.removeItem("firmaTecnico");

document.getElementById("firmaTecnicoContainer").innerHTML = `
<canvas id="firmaTecnico" class="firma" width="800" height="220"></canvas>
`;

activarFirma("firmaTecnico");

}

}

async function guardarParte(){

alert("Guardando parte...");

let firmaTecnicoFinal = "";

const firmaTecnicoCanvas =
document.getElementById("firmaTecnico");

const firmaTecnicoImg =
document.getElementById("firmaTecnicoImg");

if(firmaTecnicoImg){

firmaTecnicoFinal =
firmaTecnicoImg.src;

}else if(firmaTecnicoCanvas){

firmaTecnicoFinal =
firmaTecnicoCanvas.toDataURL("image/png");

}

const parte = {

numero:
"PT-" + Date.now(),

fecha:
document.getElementById("fecha").value,

cliente:
document.getElementById("cliente").value,

tecnico:
document.getElementById("tecnico").value,

vehiculo:
document.getElementById("vehiculo").value,

trabajo:
document.getElementById("trabajo").value,

material:
document.getElementById("material").value,

horas:
document.getElementById("horas").value,

observaciones:
document.getElementById("observaciones").value,

firma_cliente:
document.getElementById("firmaCliente").toDataURL("image/png"),

firma_tecnico:
firmaTecnicoFinal,

fotos:
fotosBase64

};

let partesLocales =
JSON.parse(
localStorage.getItem("partes")
) || [];

partesLocales.push(parte);

localStorage.setItem(
"partes",
JSON.stringify(partesLocales)
);

try{

const { error } =
await sb
.from("partes")
.insert([parte]);

if(error){

alert(
"Guardado en el dispositivo. Error Supabase: " +
error.message
);

location.href =
"partes-listado.html";

return;

}

alert(
"Parte guardado correctamente"
);

location.href =
"partes-listado.html";

}catch(err){

alert(
"Guardado en el dispositivo. Error conexión: " +
err.message
);

location.href =
"partes-listado.html";

}

}

</script>

</body>
</html>
